[Network]
# 后端 API 接口基础地址
api_url = http://192.168.0.125:8000
# 网络请求超时时间 (秒)
timeout = 15

[Runtime]
# 日志记录级别 (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
# 云端数据自动同步间隔 (分钟)
sync_interval_min = 10
# 主题模式 (light 为浅色，dark 为深色)
theme_mode = light
# 窗口吸附功能开关 (true/false)
snap_enabled = false
# 吸附目标窗口的类名 (校准后自动填充)
snap_class = 
# 吸附目标窗口的标题 (校准后自动填充)
snap_title = 
