{% extends "sqladmin/layout.html" %}
{% from 'sqladmin/_macros.html' import render_form_fields %}
{% block content %}
<div class="col-12">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">新增 {{ model_view.name }}</h3>
    </div>
    <div class="card-body border-bottom py-3">
      <form action="{{ url_for('admin:create', identity=model_view.identity) }}" method="POST"
        enctype="multipart/form-data">
        <input type="hidden" name="next" id="sqladmin-form-next-url" value="">
        <div class="row">
          {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
          {% endif %}
        </div>
        <fieldset class="form-fieldset">
          {{ render_form_fields(form, form_opts=form_opts) }}
        </fieldset>
        <div class="row">
          <div class="col-md-2">
            <a href="javascript:history.back()" class="btn">
              取消并返回
            </a>
          </div>
          <div class="col-md-6">
            <div class="btn-group flex-wrap" data-toggle="buttons">
              <input type="submit" name="save" value="立即创建" class="btn btn-primary">
              <input type="submit" name="save" value="创建并新增下一条" class="btn">
              <input type="submit" name="save" value="创建并继续完善" class="btn">
            </div>
          </div>
        </div>
        <script>
          (function () {
            var el = document.getElementById('sqladmin-form-next-url');
            if (!el) return;
            var base = {{ admin.base_url | tojson }};
            if (!base || base.charAt(0) !== '/') base = '/admin';
            base = base.replace(/\/+$/, '') || '/admin';
            try {
              var ref = document.referrer;
              if (!ref) return;
              var u = new URL(ref);
              if (u.origin !== window.location.origin) return;
              var pathWithQuery = u.pathname + (u.search || '');
              var curPath = window.location.pathname + (window.location.search || '');
              if (pathWithQuery === curPath) return;
              if (pathWithQuery === base || pathWithQuery.indexOf(base + '/') === 0) el.value = pathWithQuery;
            } catch (e) {}
          })();
        </script>
      </form>
    </div>
  </div>
</div>
{% endblock %}
