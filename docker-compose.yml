version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ai_assistant_db
    restart: always
    environment:
      MYSQL_DATABASE: ai_assistant_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # 每次栈启动时先跑迁移（已是最新版本时等价空操作），成功退出后再启动 backend
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_assistant_migrate
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root@db:3306/ai_assistant_db
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_assistant_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root@db:3306/ai_assistant_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - ./backend/downloads:/app/downloads
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mysql_data:
