version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ai_assistant_db
    restart: always
    environment:
      MYSQL_DATABASE: ai_assistant_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_assistant_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root@db:3306/ai_assistant_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
    depends_on:
      - db
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mysql_data:
